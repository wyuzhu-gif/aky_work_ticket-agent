<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>作业票审查系统</title>
    <script type="module" crossorigin src="/assets/index-BLqPc2QM.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-CAAgnnNt.css">
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>

    <script>
      // === 智能问数 - 强制显示会话历史删除按钮 + 二次确认 (2026-06-12 重建) ===
      // 策略: 找 session item 容器 (3 个子元素: title + time + delete button)
      //      用 childNodes[2] (第 3 个) 当 delete button
      (function() {
        // session item 容器特征:
        // - children.length === 3
        // - 包含 SVG button (delete button)
        // - 文本里有"分钟前"/"小时前"/"天前"/"刚刚" 或 "未命名对话" 之类
        function isSessionItem(el) {
          if (!el || el.nodeType !== 1) return false;
          // 2026-06-12 改: 不再严格要求 children.length === 3
          // SmartQuery 实际结构: <div> <ChatRegular + title+time> <Delete Button> </div>
          // 用 "包含 Button + 含 '分钟前' 等时间标识" 来判断
          const buttons = el.querySelectorAll('button');
          if (buttons.length === 0) return false;
          const text = (el.textContent || '').slice(0, 200);
          // 2026-06-12 改: 加 X/Y 格式 (会话超过 7 天的 fmtTime 输出)
          return /(\d+\s*分钟前|\d+\s*小时前|\d+\s*天前|刚刚|未命名对话|\d+\/\d+)/.test(text);
        }

        function forceShow() {
          const all = document.querySelectorAll('div, li');
          let count = 0;
          for (const el of all) {
            if (!isSessionItem(el)) continue;
            // 2026-06-12 改: 用 title="删除会话" 找 Delete button (更稳, 不依赖 SVG path)
            // session item 内 button.title === "删除会话" 才是 Delete button
            const buttons = el.querySelectorAll('button');
            let delBtn = null;
            for (const btn of buttons) {
              if (btn.title === '删除会话' || btn.title === '删除') {
                delBtn = btn;
                break;
              }
            }
            // 兼容老版本: 也接受 data-testid
            if (!delBtn) {
              for (const btn of buttons) {
                if (btn.dataset.testid === 'delete-session') {
                  delBtn = btn;
                  break;
                }
              }
            }
            if (!delBtn || delBtn.dataset.fixed === '1') continue;
            delBtn.style.opacity = '1';
            delBtn.style.background = '#dc2626';
            delBtn.style.color = '#fff';
            delBtn.style.borderRadius = '3px';
            delBtn.style.padding = '0';
            delBtn.style.minWidth = '12px';
            delBtn.style.minHeight = '12px';
            delBtn.style.width = '12px';
            delBtn.style.height = '12px';
            delBtn.style.fontSize = '10px';
            const svg = delBtn.querySelector('svg');
            if (svg) {
              svg.setAttribute('width', '10');
              svg.setAttribute('height', '10');
              svg.style.width = '10px';
              svg.style.height = '10px';
            }
            delBtn.dataset.fixed = '1';
            count++;
          }
          return count;
        }

        // === 拦截删除按钮点击, 加二次确认 ===
        document.addEventListener('click', function(e) {
          const btn = e.target.closest('button');
          if (!btn || btn.dataset.fixed !== '1') return;
          e.preventDefault();
          e.stopPropagation();
          e.stopImmediatePropagation();
          const sessionItem = btn.parentElement;
          const titleEl = sessionItem ? sessionItem.children[0] : null;
          const title = titleEl ? titleEl.textContent.trim() : '这个会话';
          if (!confirm(`确定要删除会话 "${title}" 吗?\n\n此操作不可恢复!`)) {
            return;
          }
          const keys = Object.keys(btn);
          const reactPropsKey = keys.find(k => k.startsWith('__reactProps'));
          if (reactPropsKey) {
            const props = btn[reactPropsKey];
            if (props && props.onClick) {
              try {
                const fakeEvent = new MouseEvent('click', { bubbles: true, cancelable: true });
                Object.defineProperty(fakeEvent, 'target', { value: btn });
                Object.defineProperty(fakeEvent, 'currentTarget', { value: btn });
                props.onClick(fakeEvent);
              } catch (err) {
                console.error('Failed to invoke React onClick:', err);
              }
            }
          }
        }, true);

        // MutationObserver 监听 DOM 变化
        const observer = new MutationObserver(forceShow);
        observer.observe(document.body, { childList: true, subtree: true });
        setTimeout(forceShow, 300);
        setTimeout(forceShow, 1000);
        setTimeout(forceShow, 2500);
        setTimeout(forceShow, 5000);
      })();
    </script>
  </body>
</html>
